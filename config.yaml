default_agent: star

models:
  scope_model_name: sentence-transformers/all-MiniLM-L6-v2
  prompt_guard_model_name: C:/Users/Thinkbook 14/.llama/checkpoints/Llama-Prompt-Guard-2-86M
  prompt_guard_max_length: 512
  prompt_guard_malicious_label: MALICIOUS
  pii_model_name: dslim/bert-base-NER
  pii_enabled: true
  llama_guard_model_name: meta-llama/Llama-Guard-4-12B
  llama_guard_max_new_tokens: 32
  llama_guard_fail_closed: true
  include_recent_context: false
  recent_context_messages: 3
  recent_context_chars: 600
  device: auto
  attachment_chunk_chars: 1800
  attachment_chunk_overlap: 240
  attachment_max_pages: 12
  attachment_max_lg4_images: 4

thresholds:
  pg2_warn: 0.75
  pg2_deny: 0.90
  scope_warn: 0.45
  scope_deny: 0.30
  doc_pg2_warn: 0.75
  doc_pg2_deny: 0.90
  doc_scope_deny: 0.25
  doc_flagged_ratio_warn: 0.15
  final_warn: 0.60
  final_deny: 0.78
  pii_high: 0.70
  denied_similarity_weight: 0.35

database:
  path: firewall_logs.db
  max_rows: 20

upstream:
  # Dashboard runtime setup overrides these safe fallback values.
  use_local_mock: true
  base_url:
  timeout_seconds: 20
  default_model: mock-guarded-model

firewall:
  # Global fallbacks for routes that do not override content_sources or block status.
  default_content_sources:
    - body.messages
    - body.input
    - body.prompt
    - body.question
    - body.query
    - body.message
    - body.text
    - query.prompt
    - query.q
    - header.x-user-input
  generic_block_status_code: 403
  # Request-level toggle support. Developers can keep calling the proxy and flip one
  # header/query/body field to bypass protection for a request when needed.
  request_toggle_enabled: true
  request_toggle_default_protect: true
  request_toggle_sources:
    - header.x-slashid-firewall
    - header.x-slashid-firewall-enabled
    - query.slashid_firewall
    - query.firewall
    - body.metadata.slashid_firewall
    - body.metadata.firewall_enabled
    - body.firewall.enabled
  request_toggle_protect_values: ["1", "true", "on", "yes", "protect", "enabled"]
  request_toggle_bypass_values: ["0", "false", "off", "no", "bypass", "disabled"]
  protected_routes:
    - name: openai_chat_completions
      path_pattern: /v1/chat/completions
      methods: [POST]
      content_sources:
        - body.messages
        - body.prompt
        - body.input
      block_response_format: openai_chat
      block_status_code: 200
      pass_through_if_unextractable: false
    - name: openai_responses
      path_pattern: /v1/responses
      methods: [POST]
      content_sources:
        - body.input
        - body.messages
        - body.prompt
      block_response_format: openai_response
      block_status_code: 200
      pass_through_if_unextractable: false
    - name: generic_prompt_endpoint
      path_pattern: /api/agent/*
      methods: [POST]
      content_sources:
        - body.prompt
        - body.input
        - body.payload.prompt
        - body.payload.input
        - query.prompt
        - header.x-user-input
      block_response_format: generic_json
      block_status_code: 403
      pass_through_if_unextractable: true

logging:
  level: INFO
